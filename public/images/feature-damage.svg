<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none" role="img" aria-label="Damage check overlay illustration">
  <defs>
    <linearGradient id="dmg-bg" x1="0" y1="0" x2="480" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EDF1"/>
    </linearGradient>
  </defs>
  <rect width="480" height="280" rx="12" fill="url(#dmg-bg)"/>
  <rect x="1" y="1" width="478" height="278" rx="11" stroke="#E2E8F0"/>

  <!-- Car top-down schematic -->
  <g transform="translate(120, 48)">
    <rect x="60" y="20" width="120" height="160" rx="40" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"/>
    <rect x="80" y="40" width="80" height="50" rx="8" fill="#E9EDF1" stroke="#94A3B8"/>
    <rect x="80" y="110" width="80" height="50" rx="8" fill="#E9EDF1" stroke="#94A3B8"/>
    <!-- Wheels -->
    <rect x="40" y="50" width="20" height="36" rx="6" fill="#1E293B"/>
    <rect x="180" y="50" width="20" height="36" rx="6" fill="#1E293B"/>
    <rect x="40" y="114" width="20" height="36" rx="6" fill="#1E293B"/>
    <rect x="180" y="114" width="20" height="36" rx="6" fill="#1E293B"/>
    <!-- Damage zone highlight -->
    <ellipse cx="120" cy="52" rx="28" ry="16" fill="#1E293B" opacity="0.25" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <!-- Scan overlay grid -->
  <g opacity="0.3">
    <line x1="80" y1="40" x2="80" y2="240" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="160" y1="40" x2="160" y2="240" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="240" y1="40" x2="240" y2="240" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="320" y1="40" x2="320" y2="240" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="40" y1="80" x2="360" y2="80" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="40" y1="140" x2="360" y2="140" stroke="#1E293B" stroke-width="0.5"/>
    <line x1="40" y1="200" x2="360" y2="200" stroke="#1E293B" stroke-width="0.5"/>
  </g>

  <!-- Scan corners -->
  <path d="M48 48h24M48 48v24" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  <path d="M432 48h-24M432 48v24" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  <path d="M48 232h24M48 232v-24" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  <path d="M432 232h-24M432 232v-24" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>

  <!-- Damage callout -->
  <rect x="300" y="56" width="152" height="72" rx="8" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.5"/>
  <rect x="316" y="72" width="8" height="40" rx="2" fill="#1E293B"/>
  <text x="336" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1E293B">Front bumper</text>
  <text x="336" y="104" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">Minor damage | Repaired</text>
  <text x="336" y="118" font-family="system-ui, sans-serif" font-size="10" fill="#334155">Jun 2022</text>

  <!-- Status panel -->
  <rect x="300" y="148" width="152" height="100" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="316" y="172" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#94A3B8" letter-spacing="0.05em">DAMAGE SCAN</text>
  <rect x="316" y="184" width="120" height="8" rx="2" fill="#E9EDF1"/>
  <rect x="316" y="184" width="36" height="8" rx="2" fill="#334155"/>
  <text x="316" y="210" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">1 zone flagged</text>
  <rect x="316" y="220" width="88" height="20" rx="4" fill="#F1F5F9"/>
  <text x="328" y="234" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#334155">Review advised</text>
</svg>
