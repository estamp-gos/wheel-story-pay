<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none" role="img" aria-label="Odometer verification illustration">
  <defs>
    <linearGradient id="odo-bg" x1="0" y1="0" x2="480" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EDF1"/>
    </linearGradient>
  </defs>
  <rect width="480" height="280" rx="12" fill="url(#odo-bg)"/>
  <rect x="1" y="1" width="478" height="278" rx="11" stroke="#E2E8F0"/>

  <!-- Gauge cluster -->
  <g transform="translate(140, 40)">
    <circle cx="100" cy="100" r="88" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="100" cy="100" r="72" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <!-- Tick marks -->
    <g stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round">
      <line x1="100" y1="36" x2="100" y2="48"/>
      <line x1="156" y1="52" x2="148" y2="62"/>
      <line x1="184" y1="100" x2="172" y2="100"/>
      <line x1="156" y1="148" x2="148" y2="138"/>
      <line x1="44" y1="52" x2="52" y2="62"/>
      <line x1="16" y1="100" x2="28" y2="100"/>
      <line x1="44" y1="148" x2="52" y2="138"/>
    </g>
    <!-- Needle -->
    <line x1="100" y1="100" x2="148" y2="58" stroke="#1E293B" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="8" fill="#1E293B"/>
    <!-- Digital readout -->
    <rect x="60" y="148" width="80" height="28" rx="6" fill="#1E293B"/>
    <text x="100" y="168" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">67,820</text>
    <text x="100" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">MILES</text>
  </g>

  <!-- Timeline panel -->
  <rect x="32" y="210" width="416" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <line x1="56" y1="236" x2="424" y2="236" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="80" cy="236" r="5" fill="#047857"/>
  <circle cx="180" cy="236" r="5" fill="#047857"/>
  <circle cx="300" cy="236" r="5" fill="#047857"/>
  <circle cx="400" cy="236" r="5" fill="#047857"/>
  <text x="68" y="254" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">2019</text>
  <text x="168" y="254" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">2021</text>
  <text x="288" y="254" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">2023</text>
  <text x="388" y="254" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">2025</text>

  <!-- Verified badge -->
  <rect x="320" y="48" width="128" height="36" rx="8" fill="#ECFDF5" stroke="#047857"/>
  <path d="M336 66l4 4 8-10" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="356" y="70" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#047857">No rollback</text>
</svg>
