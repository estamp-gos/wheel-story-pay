<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none" role="img" aria-label="Theft check shield illustration">
  <defs>
    <linearGradient id="theft-bg" x1="0" y1="0" x2="480" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EDF1"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="180" y1="40" x2="300" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="480" height="280" rx="12" fill="url(#theft-bg)"/>
  <rect x="1" y="1" width="478" height="278" rx="11" stroke="#E2E8F0"/>

  <!-- Shield -->
  <g transform="translate(140, 32)">
    <path d="M100 8 L180 36 V100 C180 148 140 176 100 188 C60 176 20 148 20 100 V36 Z" fill="url(#shield-grad)" stroke="#1E293B" stroke-width="1"/>
    <path d="M100 24 L164 48 V100 C164 140 132 164 100 172 C68 164 36 140 36 100 V48 Z" fill="#334155" opacity="0.5"/>
    <!-- Lock -->
    <rect x="76" y="88" width="48" height="44" rx="6" fill="#FFFFFF"/>
    <path d="M88 88 V72 C88 58 112 58 112 72 V88" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="100" cy="108" r="6" fill="#047857"/>
    <rect x="97" y="108" width="6" height="12" rx="2" fill="#047857"/>
    <!-- Checkmark -->
    <path d="M68 72 L82 86 L132 52" stroke="#047857" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Status cards -->
  <rect x="32" y="200" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="56" cy="228" r="10" fill="#ECFDF5"/>
  <path d="M52 228l3 3 6-7" stroke="#047857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="76" y="224" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E293B">Not stolen</text>
  <text x="76" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">NCIC clear</text>

  <rect x="176" y="200" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="200" cy="228" r="10" fill="#ECFDF5"/>
  <path d="M196 228l3 3 6-7" stroke="#047857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="220" y="224" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E293B">No liens</text>
  <text x="220" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Title clean</text>

  <rect x="320" y="200" width="128" height="56" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="344" cy="228" r="10" fill="#ECFDF5"/>
  <path d="M340 228l3 3 6-7" stroke="#047857" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="364" y="224" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1E293B">No export</text>
  <text x="364" y="240" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Domestic only</text>
</svg>
