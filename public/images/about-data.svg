<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none" role="img" aria-label="Data sourcing network illustration">
  <defs>
    <linearGradient id="data-bg" x1="0" y1="0" x2="640" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EDF1"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" fill="url(#data-bg)"/>
  <rect x="24" y="24" width="592" height="352" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>

  <text x="48" y="60" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1E293B">Data sourcing network</text>
  <text x="48" y="82" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Aggregated from trusted industry sources</text>

  <!-- Central hub -->
  <g transform="translate(260, 160)">
    <circle cx="60" cy="60" r="52" fill="#1E293B"/>
    <circle cx="60" cy="60" r="40" fill="#334155"/>
    <rect x="40" y="48" width="40" height="28" rx="4" fill="#1E293B"/>
    <text x="60" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">VIN</text>
    <text x="60" y="88" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#94A3B8">HUB</text>
  </g>

  <!-- Connection lines -->
  <g stroke="#CBD5E1" stroke-width="2">
    <line x1="120" y1="140" x2="260" y2="200"/>
    <line x1="120" y1="260" x2="260" y2="240"/>
    <line x1="520" y1="140" x2="380" y2="200"/>
    <line x1="520" y1="260" x2="380" y2="240"/>
    <line x1="320" y1="80" x2="320" y2="160"/>
    <line x1="320" y1="280" x2="320" y2="340"/>
  </g>
  <!-- Active connection pulses -->
  <circle cx="190" cy="170" r="4" fill="#1E293B" opacity="0.6"/>
  <circle cx="450" cy="170" r="4" fill="#1E293B" opacity="0.6"/>
  <circle cx="320" cy="120" r="4" fill="#1E293B" opacity="0.6"/>

  <!-- Source node: DMV -->
  <g transform="translate(48, 108)">
    <rect width="120" height="64" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="12" y="12" width="32" height="32" rx="6" fill="#E9EDF1"/>
    <rect x="18" y="20" width="20" height="4" rx="1" fill="#94A3B8"/>
    <rect x="18" y="28" width="16" height="4" rx="1" fill="#CBD5E1"/>
    <rect x="18" y="36" width="20" height="4" rx="1" fill="#CBD5E1"/>
    <text x="56" y="32" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">DMV / Title</text>
    <text x="56" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">50 states</text>
    <circle cx="108" cy="16" r="6" fill="#047857"/>
  </g>

  <!-- Source node: Insurance -->
  <g transform="translate(48, 228)">
    <rect width="120" height="64" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="12" y="12" width="32" height="32" rx="6" fill="#E2E8F0"/>
    <path d="M20 28h16M28 20v16" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
    <text x="56" y="32" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Insurance</text>
    <text x="56" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Claims data</text>
    <circle cx="108" cy="16" r="6" fill="#047857"/>
  </g>

  <!-- Source node: Auction -->
  <g transform="translate(472, 108)">
    <rect width="120" height="64" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="12" y="12" width="32" height="32" rx="6" fill="#F1F5F9"/>
    <rect x="18" y="22" width="8" height="12" rx="1" fill="#334155"/>
    <rect x="28" y="18" width="8" height="16" rx="1" fill="#334155"/>
    <text x="56" y="32" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Auctions</text>
    <text x="56" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Salvage records</text>
    <circle cx="108" cy="16" r="6" fill="#047857"/>
  </g>

  <!-- Source node: Police -->
  <g transform="translate(472, 228)">
    <rect width="120" height="64" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="12" y="12" width="32" height="32" rx="6" fill="#E9EDF1"/>
    <path d="M22 24h12v8h-12z M28 20v4" stroke="#1E293B" stroke-width="1.5" fill="none"/>
    <text x="56" y="32" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Law Enforce.</text>
    <text x="56" y="48" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Theft / NCIC</text>
    <circle cx="108" cy="16" r="6" fill="#047857"/>
  </g>

  <!-- Source node: OEM -->
  <g transform="translate(260, 48)">
    <rect width="120" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="36" cy="28" r="14" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="36" cy="28" r="5" fill="#64748B"/>
    <text x="60" y="26" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">OEM Recalls</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Factory data</text>
  </g>

  <!-- Source node: Service -->
  <g transform="translate(260, 308)">
    <rect width="120" height="56" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="20" y="16" width="32" height="24" rx="4" fill="#ECFDF5" stroke="#047857"/>
    <path d="M28 28h16M28 34h12" stroke="#047857" stroke-width="1.5" stroke-linecap="round"/>
    <text x="60" y="26" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">Service</text>
    <text x="60" y="42" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Odometer reads</text>
  </g>

  <!-- Stats bar -->
  <rect x="48" y="340" width="544" height="28" rx="6" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="64" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">500M+ records indexed</text>
  <text x="280" y="359" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Updated daily</text>
  <text x="480" y="359" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#047857">99.2% match rate</text>
</svg>
