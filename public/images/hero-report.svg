<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" fill="none" role="img" aria-label="Vehicle history report preview">
  <defs>
    <linearGradient id="hero-bg" x1="0" y1="0" x2="640" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E9EDF1"/>
    </linearGradient>
    <linearGradient id="hero-card" x1="80" y1="60" x2="560" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="hero-shadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
    <filter id="hero-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E293B" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="640" height="720" fill="url(#hero-bg)"/>
  <circle cx="580" cy="80" r="120" fill="#1E293B" opacity="0.06"/>
  <circle cx="60" cy="640" r="100" fill="#1E293B" opacity="0.04"/>

  <g filter="url(#hero-shadow)">
    <rect x="48" y="48" width="544" height="624" rx="20" fill="url(#hero-card)" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>

  <!-- Header bar -->
  <rect x="48" y="48" width="544" height="72" rx="20" fill="#1E293B"/>
  <rect x="48" y="96" width="544" height="24" fill="#1E293B"/>
  <rect x="72" y="68" width="32" height="32" rx="8" fill="#1E293B"/>
  <path d="M78 84h20M88 74v20" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="116" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#94A3B8" letter-spacing="0.08em">VEHICLE CHECK</text>
  <text x="116" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Vehicle History Report</text>
  <rect x="468" y="68" width="100" height="28" rx="14" fill="#047857"/>
  <circle cx="484" cy="82" r="5" fill="#FFFFFF"/>
  <text x="496" y="87" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">Complete</text>

  <!-- VIN block -->
  <rect x="72" y="144" width="496" height="88" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="92" y="172" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94A3B8" letter-spacing="0.06em">VEHICLE IDENTIFICATION NUMBER</text>
  <text x="92" y="204" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#1E293B" letter-spacing="0.12em">1HGCM82633A004352</text>
  <rect x="92" y="212" width="180" height="6" rx="3" fill="#CBD5E1" opacity="0.6"/>

  <!-- Status badges -->
  <g transform="translate(72, 252)">
    <rect width="148" height="36" rx="8" fill="#ECFDF5" stroke="#047857" stroke-width="1"/>
    <path d="M16 18l4 4 8-10" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="36" y="23" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857">Clear Title</text>
  </g>
  <g transform="translate(232, 252)">
    <rect width="148" height="36" rx="8" fill="#ECFDF5" stroke="#047857" stroke-width="1"/>
    <path d="M16 18l4 4 8-10" stroke="#047857" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="36" y="23" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#047857">No Theft</text>
  </g>
  <g transform="translate(392, 252)">
    <rect width="176" height="36" rx="8" fill="#F1F5F9" stroke="#334155" stroke-width="1"/>
    <circle cx="18" cy="18" r="6" fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="12" y="21" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#334155">!</text>
    <text x="36" y="23" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#334155">1 Minor Accident</text>
  </g>

  <!-- Vehicle summary -->
  <rect x="72" y="308" width="496" height="100" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <rect x="92" y="328" width="120" height="60" rx="8" fill="#E9EDF1"/>
  <path d="M102 378h100M112 368h80M118 358h68" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round"/>
  <circle cx="152" cy="372" r="14" fill="#94A3B8" opacity="0.4"/>
  <circle cx="192" cy="372" r="14" fill="#94A3B8" opacity="0.4"/>
  <text x="228" y="342" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E293B">2019 Honda Accord Sport</text>
  <text x="228" y="364" font-family="system-ui, sans-serif" font-size="12" fill="#94A3B8">Sedan | 2.0L | Automatic | FWD</text>
  <text x="228" y="388" font-family="system-ui, sans-serif" font-size="12" fill="#64748B">Last reported: Austin, TX | Mar 2025</text>

  <!-- Accident section -->
  <text x="72" y="440" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E293B">Accident History</text>
  <rect x="72" y="452" width="496" height="72" rx="10" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#hero-soft)"/>
  <rect x="88" y="468" width="8" height="40" rx="4" fill="#334155"/>
  <text x="108" y="484" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1E293B">Rear-end collision | Minor damage</text>
  <text x="108" y="502" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Reported Jun 2022 | Insurance claim filed</text>
  <rect x="480" y="476" width="72" height="24" rx="6" fill="#F1F5F9"/>
  <text x="492" y="492" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#334155">Repaired</text>

  <!-- Odometer section -->
  <text x="72" y="556" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E293B">Odometer Timeline</text>
  <rect x="72" y="568" width="496" height="88" rx="10" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#hero-soft)"/>
  <line x1="100" y1="620" x2="540" y2="620" stroke="#E2E8F0" stroke-width="2"/>
  <circle cx="140" cy="620" r="6" fill="#047857"/>
  <circle cx="280" cy="620" r="6" fill="#047857"/>
  <circle cx="420" cy="620" r="6" fill="#047857"/>
  <circle cx="520" cy="620" r="6" fill="#047857"/>
  <text x="120" y="600" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">2019</text>
  <text x="120" y="648" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">12 mi</text>
  <text x="258" y="600" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">2021</text>
  <text x="248" y="648" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">28,450 mi</text>
  <text x="398" y="600" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">2023</text>
  <text x="388" y="648" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">52,100 mi</text>
  <text x="498" y="600" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">2025</text>
  <text x="488" y="648" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1E293B">67,820 mi</text>
  <rect x="350" y="588" width="100" height="20" rx="4" fill="#ECFDF5"/>
  <text x="362" y="602" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#047857">No rollback</text>
</svg>
